<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIS Research Repository</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --card: #151d2e;
    --border: #1e2d45;
    --accent: #00d4ff;
    --accent2: #f5c542;
    --accent3: #4ade80;
    --text: #e2e8f0;
    --muted: #64748b;
    --tag-bg: #1e3a5f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(0,212,255,0.05) 0%, transparent 100%);
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .logo-area h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
  }
  .logo-area h1 span.gis { color: var(--accent); }
  .logo-area h1 span.repo { color: var(--accent2); }
  .logo-area p {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 1px;
  }

  .stats {
    display: flex;
    gap: 24px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* SEARCH + FILTER */
  .controls {
    max-width: 1400px;
    margin: 28px auto 0;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 240px;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 16px;
    height: 16px;
  }
  #searchInput {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px 11px 40px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--muted); }

  .filter-wrap {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,212,255,0.08);
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 32px auto;
    padding: 0 24px;
  }

  .results-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
  .results-count span { color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* CARD */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform 0.25s ease;
    transform-origin: left;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,212,255,0.12);
  }
  .card:hover::before { transform: scaleX(1); }
  .card.hidden { display: none; }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .card-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
  }
  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--tag-bg);
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .tag.green { background: rgba(74,222,128,0.1); color: var(--accent3); }
  .tag.yellow { background: rgba(245,197,66,0.1); color: var(--accent2); }

  .expand-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: none;
    border: 1px solid rgba(0,212,255,0.3);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .expand-btn:hover {
    background: rgba(0,212,255,0.1);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 760px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    position: relative;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--border);
    border: none;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    z-index: 10;
  }
  .modal-close:hover { background: var(--accent); color: #000; }

  .modal-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-icon-title {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
  }
  .modal-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }
  .modal-title {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.2;
  }
  .modal-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  .modal-body {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .step {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .step-num {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(0,212,255,0.15);
    border: 1px solid rgba(0,212,255,0.4);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .step-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    padding-top: 3px;
  }

  .datasets {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .dataset-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .dataset-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent3);
    flex-shrink: 0;
    margin-top: 5px;
  }
  .dataset-content { flex: 1; }
  .dataset-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .dataset-url {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    word-break: break-all;
  }

  .tools-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tool-pill {
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(245,197,66,0.1);
    border: 1px solid rgba(245,197,66,0.3);
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    display: none;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    header { padding: 28px 20px 20px; }
    .controls { margin-top: 16px; }
    main { padding: 0 16px; }
    .grid { grid-template-columns: 1fr; }
    .modal-body { padding: 20px; }
    .modal-header { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-area">
      <h1><span class="gis">GIS</span> <span class="repo">Repository</span></h1>
      <p>// QGIS Implementation Manual &amp; Dataset Guide</p>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-num">40</div><div class="stat-label">Topics</div></div>
      <div class="stat"><div class="stat-num">8</div><div class="stat-label">Categories</div></div>
      <div class="stat"><div class="stat-num">80+</div><div class="stat-label">Datasets</div></div>
    </div>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 111 11a6 6 0 0116 0z"/></svg>
      <input type="text" id="searchInput" placeholder="Search topics, tools, datasets...">
    </div>
    <div class="filter-wrap" id="filterWrap">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="environment">Environment</button>
      <button class="filter-btn" data-cat="urban">Urban</button>
      <button class="filter-btn" data-cat="disaster">Disaster</button>
      <button class="filter-btn" data-cat="agriculture">Agriculture</button>
      <button class="filter-btn" data-cat="social">Social</button>
      <button class="filter-btn" data-cat="water">Water</button>
      <button class="filter-btn" data-cat="health">Health &amp; Safety</button>
      <button class="filter-btn" data-cat="remote">Remote Sensing</button>
    </div>
  </div>
</header>

<main>
  <div class="results-count" id="resultsCount"><span id="countNum">40</span> topics found</div>
  <div class="grid" id="grid"></div>
  <div class="no-results" id="noResults">No topics found. Try a different search.</div>
</main>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

const catColors = {
  environment: '#22c55e', urban: '#8b5cf6', disaster: '#ef4444',
  agriculture: '#f59e0b', social: '#f97316', water: '#0ea5e9',
  health: '#ec4899', remote: '#6366f1'
};

let activeFilter = 'all';

function renderCards(filtered) {
  const grid = document.getElementById('grid');
  const count = document.getElementById('countNum');
  const noResults = document.getElementById('noResults');
  grid.innerHTML = '';
  count.textContent = filtered.length;
  if (filtered.length === 0) {
    noResults.style.display = 'block';
  } else {
    noResults.style.display = 'none';
    filtered.forEach(t => {
      const col = catColors[t.cat] || '#00d4ff';
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-header">
          <div class="card-icon" style="background:${t.color || 'rgba(0,212,255,0.1)'};">${t.icon}</div>
          <div class="card-title">${t.title}</div>
        </div>
        <div class="card-desc">${t.desc}</div>
        <div class="card-tags">
          ${t.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
          <span class="tag green">${t.cat}</span>
        </div>
        <button class="expand-btn">VIEW GUIDE →</button>
      `;
      card.querySelector('.expand-btn').addEventListener('click', () => openModal(t));
      grid.appendChild(card);
    });
  }
}

function filterAndSearch() {
  const query = document.getElementById('searchInput').value.toLowerCase();
  let filtered = topics;
  if (activeFilter !== 'all') filtered = filtered.filter(t => t.cat === activeFilter);
  if (query) {
    filtered = filtered.filter(t =>
      t.title.toLowerCase().includes(query) ||
      t.desc.toLowerCase().includes(query) ||
      t.tags.some(tag => tag.toLowerCase().includes(query)) ||
      (t.tools && t.tools.some(tool => tool.toLowerCase().includes(query)))
    );
  }
  renderCards(filtered);
}

function openModal(t) {
  const header = document.getElementById('modalHeader');
  const body = document.getElementById('modalBody');
  header.innerHTML = `
    <div class="modal-icon-title">
      <div class="modal-icon" style="background:${t.color || 'rgba(0,212,255,0.1)'};">${t.icon}</div>
      <div class="modal-title">${t.title}</div>
    </div>
    <div class="modal-desc">${t.desc}</div>
    <div style="margin-top:12px; display:flex; flex-wrap:wrap; gap:6px;">
      ${t.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
      <span class="tag green">${t.cat}</span>
    </div>
  `;
  body.innerHTML = `
    <div>
      <div class="section-label">🛠 TOOLS & SOFTWARE</div>
      <div class="tools-row">${(t.tools||[]).map(tool => `<span class="tool-pill">${tool}</span>`).join('')}</div>
    </div>
    <div>
      <div class="section-label">📋 IMPLEMENTATION STEPS</div>
      <div class="steps">${(t.steps||[]).map((s,i) => `
        <div class="step">
          <div class="step-num">${i+1}</div>
          <div class="step-text">${s}</div>
        </div>`).join('')}
      </div>
    </div>
    <div>
      <div class="section-label">🗄 DATASETS & SOURCES</div>
      <div class="datasets">${(t.datasets||[]).map(d => `
        <div class="dataset-item">
          <div class="dataset-dot"></div>
          <div class="dataset-content">
            <div class="dataset-name">${d.name}</div>
            <div class="dataset-url">${d.url}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

// Events
document.getElementById('searchInput').addEventListener('input', filterAndSearch);
document.getElementById('filterWrap').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.cat;
  filterAndSearch();
});
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('open');
});
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
});

renderCards(topics);
</script>
